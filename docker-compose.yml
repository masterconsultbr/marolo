version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: futebol_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - futebol-network

  supabase-mock:
    # Nota: Para desenvolvimento real, use Supabase cloud
    # Este é apenas um placeholder
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: futebol_app
    ports:
      - "5433:5432"
    networks:
      - futebol-network

volumes:
  postgres_data:

networks:
  futebol-network:
    driver: bridge
